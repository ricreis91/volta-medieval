<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Viagem Medieval</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-amber-50 h-screen flex items-center justify-center font-sans">

    <div class="bg-white p-8 rounded-lg shadow-xl max-w-sm w-full border-t-8 border-amber-700 text-center">
        <div class="flex justify-center mb-6">
            <img src="logo-volta.jpg" alt="Logotipo VOLTA" class="h-24 object-contain rounded-full border-2 border-amber-200" onerror="this.style.display='none'">
        </div>
        
        <h2 class="text-2xl font-bold text-amber-800 mb-6 uppercase tracking-widest">Sistema VOLTA</h2>
        
        <form id="login-form" onsubmit="fazerLogin(event)" autocomplete="off">
            <div class="mb-4">
                <input type="text" id="username" placeholder="Utilizador" required class="w-full p-3 border border-gray-300 rounded focus:ring-2 focus:ring-amber-500 outline-none">
            </div>
            <div class="mb-6">
                <input type="password" id="password" readonly placeholder="Palavra-passe" autocomplete="new-password" required class="w-full p-3 border border-gray-300 rounded focus:ring-2 focus:ring-amber-500 outline-none">
            </div>
            
            <p id="erro-msg" class="text-red-500 font-bold mb-4 hidden">Credenciais incorretas!</p>
            
            <button type="submit" class="w-full bg-amber-700 text-white p-3 rounded font-bold hover:bg-amber-800 transition shadow">
                Entrar no Sistema
            </button>
        </form>
    </div>

    <script>
        function fazerLogin(event) {
            event.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            if (user === 'user' && pass === 'medieval') {
                // Guarda uma chave de sessão simples e redireciona para a app
                sessionStorage.setItem('autenticado', 'sim');
                window.location.href = 'app.html';
            } else {
                document.getElementById('erro-msg').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
